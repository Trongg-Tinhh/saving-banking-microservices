server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: saving-product-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saving_banking}
    username: ${SPRING_DATASOURCE_USERNAME:saving_user}
    password: ${SPRING_DATASOURCE_PASSWORD:saving_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SavingProductPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: saving_product_schema
        format_sql: false
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

jwt:
  secret: ${JWT_SECRET:s4v1ng-b4nk1ng-jwt-s3cr3t-k3y-must-be-256-bits-long!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.saving.product: INFO
    com.saving.product.service: INFO
    com.saving.product.filter: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-NO_CORR}] [%X{username:--}] %-5level %logger{36} - %msg%n"
