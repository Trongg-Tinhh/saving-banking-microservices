# ==============================================================
# customer-service – Spring Boot  |  Port 8082
# Depends on: postgres, rabbitmq, auth-service
# ==============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: saving-banking
  labels:
    app: customer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: localhost:5001/customer-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA
              value: customer_schema
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 20
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: saving-banking
  labels:
    app: customer-service
spec:
  selector:
    app: customer-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
