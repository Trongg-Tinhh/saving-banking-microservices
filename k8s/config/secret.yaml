# ==============================================================
# K8s Secret – sensitive credentials
# ALL password / key variants are included so every service can
# find its own env-var name (Spring Boot, Python, Node.js).
# ==============================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: saving-banking
type: Opaque
stringData:
  # ── PostgreSQL ────────────────────────────────────────────────
  POSTGRES_USER:              postgres
  POSTGRES_PASSWORD:          postgres
  # Spring Boot variants
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
  # saving-transaction-service variant
  DB_USER:  postgres
  DB_PASS:  postgres

  # ── RabbitMQ ──────────────────────────────────────────────────
  # Docker image bootstrap creds
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
  # Spring Boot / lifecycle-service variants
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest
  # saving-transaction-service variant
  RABBITMQ_USER: guest
  RABBITMQ_PASS: guest

  # ── JWT ───────────────────────────────────────────────────────
  JWT_SECRET: "s4v1ng-b4nk1ng-jwt-s3cr3t-k3y-must-be-256-bits-long!!"
