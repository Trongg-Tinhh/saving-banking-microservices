server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: auth-service

  # ── Database ──────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saving_banking}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthServicePool
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  # ── JPA / Hibernate ───────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth_schema
        format_sql: false
        jdbc:
          time_zone: UTC

  # ── RabbitMQ ──────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

# ── JWT ───────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:s4v1ng-b4nk1ng-jwt-s3cr3t-k3y-must-be-256-bits-long!!}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}         # 1 hour
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}  # 24 hours

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: auth-service
    version: 1.0.0
    description: Authentication & Authorization Service

# ── SpringDoc / Swagger ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  info:
    title: Auth Service API
    version: v1.0.0

# ── Logging ───────────────────────────────────────────────────────
logging:
  level:
    com.saving.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-NO_CORR}] %-5level %logger{40} - %msg%n"
