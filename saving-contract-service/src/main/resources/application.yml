server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: saving-contract-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saving_banking}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ContractServicePool
      minimum-idle: 2
      maximum-pool-size: 15
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: saving_contract_schema
        format_sql: false
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

jwt:
  secret: ${JWT_SECRET:s4v1ng-b4nk1ng-jwt-s3cr3t-k3y-must-be-256-bits-long!!}

# Downstream service URLs
# Defaults → localhost (local dev). Docker Compose always sets explicit env vars to override.
services:
  customer-url: ${CUSTOMER_SERVICE_URL:http://localhost:8082}
  account-url:  ${ACCOUNT_SERVICE_URL:http://localhost:8083}
  product-url:  ${PRODUCT_SERVICE_URL:http://localhost:8084}

# RestTemplate timeout
rest-client:
  connect-timeout-ms: ${REST_CONNECT_TIMEOUT:5000}
  read-timeout-ms:    ${REST_READ_TIMEOUT:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.saving.contract: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId:-NO_CORR}] %logger{36} - %msg%n"
